name: Test PyPI Publishing
on:
  workflow_dispatch:
  pull_request:
  push:

jobs:
  test-publish:
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup poetry
        run: |
          curl -sSL https://install.python-poetry.org/ | python - && echo "$HOME/.poetry/bin" >> $GITHUB_PATH
        env:
          POETRY_VERSION: 1.8.2

      - name: Install dependencies
        run: |
          poetry install

      - name: Extract version
        id: extract-version
        run: |
          echo "version=$(poetry version -s)" >> $GITHUB_OUTPUT

      - name: Build distribution
        run: |
          poetry build --no-interaction

      - name: Check if distributions exist
        run: |
          ls -la dist/
          echo "✅ Distributions built successfully"

      - name: Get OIDC token and publish to TestPyPI
        env:
          AUDIENCE: test.pypi.org
        run: |
          # Get OIDC token from GitHub Actions
          OIDC_TOKEN=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=$AUDIENCE" | jq -r '.value')
          
          # Install twine
          pip install twine
          
          # Publish using OIDC token (TestPyPI trusted publishing accepts OIDC tokens directly)
          TWINE_USERNAME=__token__ TWINE_PASSWORD="$OIDC_TOKEN" \
            twine upload --repository-url https://test.pypi.org/legacy/ --skip-existing dist/*

      - name: Success message
        run: echo "ℹ️ Test publish completed for version ${{ steps.extract-version.outputs.version }} 🎉"
