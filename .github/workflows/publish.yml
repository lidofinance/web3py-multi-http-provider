name: Python package
on:
  release:
    types: [published]   # run when the release is published

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
      contents: read 
    outputs:
      version: ${{ steps.extract-version.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup poetry
        run: |
          curl -sSL https://install.python-poetry.org/ | python - && echo "$HOME/.poetry/bin" >> $GITHUB_PATH
        env:
          POETRY_VERSION: 1.8.2

      - name: Install dependencies
        run: |
          poetry install

      - name: Extract version
        id: extract-version
        run: |
          echo "version=$(poetry version -s)" >> $GITHUB_OUTPUT

      - name: Build distribution
        run: |
          poetry build --no-interaction

      - name: Get OIDC token and publish to PyPI
        env:
          AUDIENCE: pypi.org
        run: |
          # Get OIDC token from GitHub Actions
          OIDC_TOKEN=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=$AUDIENCE" | jq -r '.value')
          
          # Install twine
          pip install twine
          
          # Publish using OIDC token (PyPI trusted publishing accepts OIDC tokens directly)
          TWINE_USERNAME=__token__ TWINE_PASSWORD="$OIDC_TOKEN" \
            twine upload --repository-url https://upload.pypi.org/legacy/ dist/*

      - name: Success message
        run: echo "ℹ️ Published version ${{ steps.extract-version.outputs.version }} 🎉"