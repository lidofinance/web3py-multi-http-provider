name: Python package
on:
  release:
    types: [published]   # run when the release is published

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
      contents: read 
    outputs:
      version: ${{ steps.extract-version.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup poetry
        run: |
          curl -sSL https://install.python-poetry.org/ | python - && echo "$HOME/.poetry/bin" >> $GITHUB_PATH
        env:
          POETRY_VERSION: 1.8.2

      - name: Install dependencies
        run: |
          poetry install

      - name: Set version from release tag
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          poetry version "$VERSION"
          echo "Building version: $VERSION"

      - name: Extract version
        id: extract-version
        run: |
          echo "version=$(poetry version -s)" >> $GITHUB_OUTPUT

      - name: Build distribution
        run: |
          poetry build --no-interaction

      - name: Get OIDC token and publish to PyPI
        run: |
          # Setup OIDC token (sets OIDC_TOKEN and TOKEN_EXCHANGE_URL environment variables)
          source .github/scripts/setup_oidc_token.sh pypi.org
          
          # Install dependencies
          pip install twine requests
          
          # Exchange token and upload using shared script
          python3 .github/scripts/pypi_oidc_upload.py \
            --repository-url "https://upload.pypi.org/legacy/"

      - name: Success message
        run: echo "ℹ️ Published version ${{ steps.extract-version.outputs.version }} 🎉"