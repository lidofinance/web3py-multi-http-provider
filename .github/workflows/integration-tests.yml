name: Integration Tests

on:
  push:
  pull_request:

jobs:
  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      WEB3_MULTI_PROVIDER_INTEGRATION_RPC_URLS: ${{ secrets.WEB3_MULTI_PROVIDER_INTEGRATION_RPC_URLS }}

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup poetry
        run: |
          curl -sSL https://install.python-poetry.org/ | python - && echo "$HOME/.poetry/bin" >> $GITHUB_PATH
        env:
          POETRY_VERSION: 1.8.2

      - name: Install dependencies
        run: |
          poetry install

      - name: Run integration test
        run: |
          poetry run pytest -m integration tests/test_integration_http_provider.py
